<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diary Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .admin-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
        input { padding: 8px; flex-grow: 1; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #ff7eb3; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Admin Panel</h1>
    <div id="admin-container"></div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBxk_492uH0vJLr-iijocmRHjnvx9eLXY4", 
            projectId: "summer-diary-8e0b6", 
            storageBucket: "summer-diary-8e0b6.firebasestorage.app" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const container = document.getElementById('admin-container');
        
        // 1. Create the UI and Load current data
        for (let i = 1; i <= 5; i++) {
            container.innerHTML += `
                <div class="admin-card">
                    <label>Title ${i}:</label>
                    <input type="text" id="input${i}" placeholder="Loading...">
                    <button onclick="updateTitle(${i})">Update</button>
                </div>
            `;
            
            // Fetch current value to show in the input box
            db.collection("settings").doc("title" + i).get().then(doc => {
                if (doc.exists) {
                    document.getElementById('input' + i).value = doc.data().text;
                }
            });
        }

        // 2. Logic to push to Firebase
        async function updateTitle(idNumber) {
            const newText = document.getElementById('input' + idNumber).value;
            if (!newText) return alert("Please enter text");

            try {
                await db.collection("settings").doc("title" + idNumber).set({
                    text: newText
                });
                alert("Updated Title " + idNumber + "!");
            } catch (error) {
                console.error("Error:", error);
                alert("Update failed. Check console.");
            }
        }
    </script>
</body>
</html>
