<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(120deg, #fbc531 0%, #e84118 100%); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: rgba(0,0,0,0.5); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #4cd137; border: none; color: white; font-weight: bold; border-radius: 5px; }
        #admin-content { display: none; }
    </style>
</head>
<body>

    <div id="login-box" class="box">
        <h2>Admin Access</h2>
        <input type="password" id="passInput" placeholder="Enter Password">
        <button onclick="checkPass()">Login</button>
    </div>

    <div id="admin-content" class="box">
        <h1>Edit Prompts</h1>
        <input type="text" id="t1" placeholder="Prompt 1">
        <input type="text" id="t2" placeholder="Prompt 2">
        <input type="text" id="t3" placeholder="Prompt 3">
        <input type="text" id="t4" placeholder="Prompt 4">
        <input type="text" id="t5" placeholder="Prompt 5">
        <button onclick="saveTitles()">Update Titles</button>
        <br><br>
        <a href="index.html" style="color:white;">Back to Diary</a>
    </div>

    <script>
        const firebaseConfig = { /* USE YOUR EXISTING CONFIG */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function checkPass() {
            if (document.getElementById('passInput').value === "Sowhat") {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else { alert("Wrong password!"); }
        }

        async function saveTitles() {
            const batch = db.batch();
            for(let i=1; i<=5; i++) {
                const val = document.getElementById('t'+i).value;
                const ref = db.collection("settings").doc("title"+i);
                batch.set(ref, { text: val });
            }
            await batch.commit();
            alert("Titles updated!");
        }
    </script>
</body>
</html>
